<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Pic</title>
    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background: #fff;
        }

        body {
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        main {
            width: min(100%, 820px);
            display: grid;
            gap: 18px;
        }

        .card {
            margin: 0;
            padding: 0;
            border-radius: 18px;
            background: #fff;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        }

        img {
            display: block;
            max-width: 100%;
            width: auto;
            height: auto;
            margin: 0 auto;
            border-radius: 18px;
            background: #fff;
        }
    </style>
</head>
<body>
    <main>
        <div class="card">
            <img alt="random:h" />
        </div>

        <div class="card">
            <img alt="random:v" />
        </div>
    </main>

    <script src="random.js"></script>
</body>
</html>
